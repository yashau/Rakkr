[tools]
node = "26.3.1"
pnpm = "11.9.0"
rust = "1.96.0"

[env]
_.file = ".env"

[tasks.setup]
description = "Install toolchains and workspace dependencies"
run = "mise install && mise run install"

[tasks.install]
description = "Install workspace dependencies"
run = "pnpm install"

[tasks."services:up"]
description = "Start local development services"
run = "docker compose up -d postgres"

[tasks."services:down"]
description = "Stop local development services"
run = "docker compose down"

[tasks."install:ci"]
description = "Install workspace dependencies in CI with the locked dependency graph"
run = "pnpm install --frozen-lockfile"

[tasks.dev]
depends = ["node:build-libs"]
description = "Run the API and web UI"
run = "pnpm -r --parallel --filter @rakkr/api --filter @rakkr/web dev"

[tasks.check]
depends = [
  "auth:check-oidc",
  "check:loc",
  "db:verify",
  "ops:check-alerts",
  "ops:check-grafana",
  "ops:check-observability-docs",
  "ops:check-prometheus",
  "security:check-rbac",
  "security:check-transport",
  "scheduler:check",
  "settings:check",
  "recordings:check",
  "recordings:check-first-reliable",
  "devices:check-generic",
  "health:check-watchdog",
  "storage:check",
  "operations:check",
  "time:check",
  "node:check",
  "node:test",
  "node:lint",
  "node:format-check",
  "docs:lint",
  "agent:fake-controller-smoke",
  "rust:check",
  "rust:fmt-check",
  "rust:clippy",
  "rust:miri",
]
description = "Run all repository checks"

[tasks."auth:check-oidc"]
description = "Validate Azure AD OIDC baseline documentation"
run = "node scripts/verify-oidc-baseline.mjs"

[tasks.build]
depends = ["node:build", "rust:build"]
description = "Build the workspace"

[tasks."check:loc"]
description = "Enforce the 1000 LOC per file budget"
run = "node scripts/check-loc.mjs"

[tasks."ops:check-alerts"]
description = "Validate Prometheus alert rules"
run = "node scripts/verify-prometheus-alerts.mjs"

[tasks."ops:check-grafana"]
description = "Validate Grafana dashboard examples"
run = "node scripts/verify-grafana-dashboard.mjs"

[tasks."ops:check-observability-docs"]
description = "Validate observability runbook links"
run = "node scripts/verify-observability-docs.mjs"

[tasks."ops:check-prometheus"]
description = "Validate Prometheus scrape and Mimir remote write config"
run = "node scripts/verify-prometheus-config.mjs"

[tasks."security:check-rbac"]
description = "Validate RBAC and audit baseline documentation"
run = "node scripts/verify-rbac-audit-baseline.mjs"

[tasks."security:check-transport"]
description = "Validate transport security baseline documentation"
run = "node scripts/verify-transport-security-baseline.mjs"

[tasks."scheduler:check"]
description = "Validate scheduler baseline documentation"
run = "node scripts/verify-scheduler-baseline.mjs"

[tasks."settings:check"]
description = "Validate settings/templates baseline documentation"
run = "node scripts/verify-settings-templates-baseline.mjs"

[tasks."recordings:check"]
description = "Validate recording library baseline documentation"
run = "node scripts/verify-recording-library-baseline.mjs"

[tasks."recordings:check-first-reliable"]
description = "Validate first reliable recording baseline documentation"
run = "node scripts/verify-first-reliable-recording-baseline.mjs"

[tasks."devices:check-generic"]
description = "Validate generic audio device baseline documentation"
run = "node scripts/verify-generic-device-baseline.mjs"

[tasks."health:check-watchdog"]
description = "Validate health watchdog partial baseline documentation"
run = "node scripts/verify-health-watchdog-baseline.mjs"

[tasks."storage:check"]
description = "Validate storage upload baseline documentation"
run = "node scripts/verify-storage-upload-baseline.mjs"

[tasks."operations:check"]
description = "Validate operations baseline documentation"
run = "node scripts/verify-operations-baseline.mjs"

[tasks."time:check"]
description = "Validate date/time baseline documentation"
run = "node scripts/verify-date-time-baseline.mjs"

[tasks."node:build-libs"]
description = "Build shared Node workspace libraries"
run = "pnpm --filter @rakkr/shared --filter @rakkr/db build"

[tasks."node:build"]
description = "Build Node workspace packages and apps"
run = "pnpm -r --if-present build"

[tasks."node:check"]
depends = ["node:build-libs"]
description = "Run TypeScript checks"
run = "pnpm -r --if-present check"

[tasks."node:test"]
depends = ["node:build-libs"]
description = "Run Node workspace tests"
run = "pnpm -r --if-present test"

[tasks."node:lint"]
description = "Run Oxlint with Tailwind CSS rules"
run = "pnpm exec oxlint . --react-plugin --jsx-a11y-plugin --import-plugin --deny-warnings"

[tasks."node:format"]
description = "Format Node/TypeScript files with Oxfmt"
run = "pnpm exec oxfmt --write apps packages \"!packages/db/drizzle/**\""

[tasks."node:format-check"]
description = "Check Node/TypeScript formatting with Oxfmt"
run = "pnpm exec oxfmt --check apps packages \"!packages/db/drizzle/**\""

[tasks."db:generate"]
description = "Generate Drizzle migrations"
run = "pnpm --filter @rakkr/db db:generate"

[tasks."db:migrate"]
description = "Apply Drizzle migrations to the configured Postgres database"
run = "pnpm --filter @rakkr/db db:migrate"

[tasks."db:verify"]
description = "Replay Drizzle migrations against a fresh throwaway Postgres database"
run = "pnpm --filter @rakkr/db db:verify"

[tasks.release]
description = "Cut a release by pushing a <component>-v<YYYY.MM.DD-N> tag (agent|docs|controller)"
run = "node scripts/release.mjs"

[tasks."agent:loopback-smoke"]
description = "Exercise a Linux ALSA snd-aloop fake capture device"
run = "bash scripts/alsa-loopback-smoke.sh"

[tasks."agent:loopback-meter-smoke"]
description = "Sample Rakkr agent meters from a Linux ALSA snd-aloop fake capture device"
run = "bash scripts/agent-loopback-meter-smoke.sh"

[tasks."agent:loopback-render-smoke"]
description = "Capture and render mapped audio from a Linux ALSA snd-aloop fake device"
run = "bash scripts/alsa-loopback-render-smoke.sh"

[tasks."agent:loopback-fixture-smoke"]
description = "Replay the speech fixture through ALSA snd-aloop and assert clean/fault meter behavior"
run = "bash scripts/agent-loopback-fixture-smoke.sh"

[tasks."agent:loopback-job-smoke"]
description = "Run a full recorder-agent job against an ALSA snd-aloop speech fixture"
run = "bash scripts/agent-loopback-job-smoke.sh"

[tasks."agent:loopback-longrun-smoke"]
description = "Run a longer full recorder-agent job against a looped ALSA snd-aloop speech fixture"
run = "env RAKKR_LOOPBACK_JOB_SECONDS=${RAKKR_LOOPBACK_LONGRUN_SECONDS:-45} bash scripts/agent-loopback-job-smoke.sh"

[tasks."agent:alsa-capture-smoke"]
description = "Capture and validate a generic Linux ALSA hardware device"
run = "bash scripts/alsa-capture-smoke.sh"

[tasks."agent:alsa-meter-smoke"]
description = "Sample and validate Rakkr agent meters from a generic Linux ALSA hardware device"
run = "bash scripts/agent-alsa-meter-smoke.sh"

[tasks."agent:alsa-job-smoke"]
description = "Run a full recorder-agent job against a generic Linux ALSA hardware device"
run = "bash scripts/agent-alsa-job-smoke.sh"

[tasks."agent:x32-job-smoke"]
description = "Run a full recorder-agent job against the X32 X-USB ALSA hardware device"
run = "env RAKKR_ALSA_JOB_EXPECT_CARD=XUSB RAKKR_ALSA_JOB_DEVICE=hw:CARD=XUSB,DEV=0 RAKKR_ALSA_JOB_FORMAT=S32_LE RAKKR_ALSA_JOB_CHANNELS=32 RAKKR_ALSA_JOB_SECONDS=${RAKKR_X32_JOB_SECONDS:-5} RAKKR_ALSA_JOB_WORK_DIR=${RAKKR_X32_JOB_WORK_DIR:-/tmp/rakkr-x32-job-test} RAKKR_ALSA_JOB_SMOKE_LABEL='X32 full-agent job smoke' bash scripts/agent-alsa-job-smoke.sh"

[tasks."agent:x32-longrun-job-smoke"]
description = "Run a longer full recorder-agent job against the X32 X-USB ALSA hardware device"
run = "env RAKKR_ALSA_JOB_EXPECT_CARD=XUSB RAKKR_ALSA_JOB_DEVICE=hw:CARD=XUSB,DEV=0 RAKKR_ALSA_JOB_FORMAT=S32_LE RAKKR_ALSA_JOB_CHANNELS=32 RAKKR_ALSA_JOB_SECONDS=${RAKKR_X32_LONGRUN_JOB_SECONDS:-45} RAKKR_ALSA_JOB_WORK_DIR=${RAKKR_X32_LONGRUN_JOB_WORK_DIR:-/tmp/rakkr-x32-longrun-job-test} RAKKR_ALSA_JOB_SMOKE_LABEL='X32 long-run full-agent job smoke' bash scripts/agent-alsa-job-smoke.sh"

[tasks."agent:x32-meter-smoke"]
description = "Sample Rakkr agent meters from the X32 X-USB ALSA hardware device"
run = "env RAKKR_ALSA_METER_EXPECT_CARD=XUSB RAKKR_ALSA_METER_DEVICE=hw:CARD=XUSB,DEV=0 RAKKR_ALSA_METER_FORMAT=S32_LE RAKKR_ALSA_METER_CHANNELS=32 RAKKR_ALSA_METER_SECONDS=${RAKKR_X32_METER_SECONDS:-3} RAKKR_ALSA_METER_OUTPUT=${RAKKR_X32_METER_OUTPUT:-/tmp/rakkr-x32-meter-smoke.json} RAKKR_ALSA_METER_SMOKE_LABEL='X32 S32_LE meter smoke' bash scripts/agent-alsa-meter-smoke.sh"

[tasks."agent:x32-meter-soak"]
description = "Repeatedly sample Rakkr agent meters from the X32 X-USB ALSA hardware device"
run = "env RAKKR_ALSA_METER_EXPECT_CARD=XUSB RAKKR_ALSA_METER_DEVICE=hw:CARD=XUSB,DEV=0 RAKKR_ALSA_METER_FORMAT=S32_LE RAKKR_ALSA_METER_CHANNELS=32 RAKKR_ALSA_METER_SECONDS=${RAKKR_X32_METER_SOAK_SECONDS:-3} RAKKR_ALSA_METER_ITERATIONS=${RAKKR_X32_METER_SOAK_ITERATIONS:-5} RAKKR_ALSA_METER_INTERVAL_SECONDS=${RAKKR_X32_METER_SOAK_INTERVAL_SECONDS:-2} RAKKR_ALSA_METER_OUTPUT=${RAKKR_X32_METER_SOAK_OUTPUT:-/tmp/rakkr-x32-meter-soak.json} RAKKR_ALSA_METER_SMOKE_LABEL='X32 repeated S32_LE meter soak' bash scripts/agent-alsa-meter-smoke.sh"

[tasks."agent:x32-low-signal-health-smoke"]
description = "Run the recorder-agent health loop against quiet X32 X-USB ALSA hardware"
run = "env RAKKR_ALSA_HEALTH_EXPECT_CARD=XUSB RAKKR_ALSA_HEALTH_DEVICE=hw:CARD=XUSB,DEV=0 RAKKR_ALSA_HEALTH_FORMAT=S32_LE RAKKR_ALSA_HEALTH_CHANNELS=32 RAKKR_ALSA_HEALTH_METER_SECONDS=${RAKKR_X32_HEALTH_METER_SECONDS:-3} RAKKR_ALSA_HEALTH_RUN_SECONDS=${RAKKR_X32_HEALTH_RUN_SECONDS:-8} RAKKR_ALSA_HEALTH_EXPECT_EVENT=agent.meter.low_signal RAKKR_METER_FLATLINE_DBFS=${RAKKR_X32_HEALTH_FLATLINE_DBFS:--200} RAKKR_ALSA_HEALTH_WORK_DIR=${RAKKR_X32_HEALTH_WORK_DIR:-/tmp/rakkr-x32-low-signal-health-test} RAKKR_ALSA_HEALTH_SMOKE_LABEL='X32 low-signal health smoke' bash scripts/agent-alsa-health-smoke.sh"

[tasks."agent:x32-low-signal-health-sync-smoke"]
description = "Run the recorder-agent health loop against quiet X32 X-USB ALSA hardware and assert fake-controller health sync"
run = "env RAKKR_ALSA_HEALTH_EXPECT_CARD=XUSB RAKKR_ALSA_HEALTH_DEVICE=hw:CARD=XUSB,DEV=0 RAKKR_ALSA_HEALTH_FORMAT=S32_LE RAKKR_ALSA_HEALTH_CHANNELS=32 RAKKR_ALSA_HEALTH_METER_SECONDS=${RAKKR_X32_HEALTH_METER_SECONDS:-3} RAKKR_ALSA_HEALTH_RUN_SECONDS=${RAKKR_X32_HEALTH_RUN_SECONDS:-8} RAKKR_ALSA_HEALTH_EXPECT_EVENT=agent.meter.low_signal RAKKR_ALSA_HEALTH_EXPECT_SYNC=1 RAKKR_METER_FLATLINE_DBFS=${RAKKR_X32_HEALTH_FLATLINE_DBFS:--200} RAKKR_ALSA_HEALTH_WORK_DIR=${RAKKR_X32_HEALTH_SYNC_WORK_DIR:-/tmp/rakkr-x32-low-signal-health-sync-test} RAKKR_ALSA_HEALTH_SMOKE_LABEL='X32 low-signal health sync smoke' bash scripts/agent-alsa-health-smoke.sh"

[tasks."agent:alsa-pch-meter-smoke"]
description = "Sample Rakkr agent meters from the Debian rig HDA Intel PCH ALSA hardware device"
run = "env RAKKR_ALSA_METER_EXPECT_CARD=PCH RAKKR_ALSA_METER_DEVICE=hw:CARD=PCH,DEV=0 RAKKR_ALSA_METER_FORMAT=S16_LE RAKKR_ALSA_METER_CHANNELS=2 RAKKR_ALSA_METER_SECONDS=${RAKKR_ALSA_PCH_METER_SECONDS:-3} RAKKR_ALSA_METER_OUTPUT=${RAKKR_ALSA_PCH_METER_OUTPUT:-/tmp/rakkr-alsa-pch-meter-smoke.json} RAKKR_ALSA_METER_SMOKE_LABEL='ALSA PCH S16_LE meter smoke' bash scripts/agent-alsa-meter-smoke.sh"

[tasks."agent:alsa-pch-flatline-health-smoke"]
description = "Run the recorder-agent health loop against silent Debian rig HDA Intel PCH ALSA hardware"
run = "env RAKKR_ALSA_HEALTH_EXPECT_CARD=PCH RAKKR_ALSA_HEALTH_DEVICE=hw:CARD=PCH,DEV=0 RAKKR_ALSA_HEALTH_FORMAT=S16_LE RAKKR_ALSA_HEALTH_CHANNELS=2 RAKKR_ALSA_HEALTH_METER_SECONDS=${RAKKR_ALSA_PCH_HEALTH_METER_SECONDS:-3} RAKKR_ALSA_HEALTH_RUN_SECONDS=${RAKKR_ALSA_PCH_HEALTH_RUN_SECONDS:-8} RAKKR_ALSA_HEALTH_EXPECT_EVENT=agent.meter.flatline RAKKR_ALSA_HEALTH_WORK_DIR=${RAKKR_ALSA_PCH_HEALTH_WORK_DIR:-/tmp/rakkr-alsa-pch-flatline-health-test} RAKKR_ALSA_HEALTH_SMOKE_LABEL='ALSA PCH flatline health smoke' bash scripts/agent-alsa-health-smoke.sh"

[tasks."agent:alsa-pch-flatline-health-sync-smoke"]
description = "Run the recorder-agent health loop against silent Debian rig HDA Intel PCH ALSA hardware and assert fake-controller health sync"
run = "env RAKKR_ALSA_HEALTH_EXPECT_CARD=PCH RAKKR_ALSA_HEALTH_DEVICE=hw:CARD=PCH,DEV=0 RAKKR_ALSA_HEALTH_FORMAT=S16_LE RAKKR_ALSA_HEALTH_CHANNELS=2 RAKKR_ALSA_HEALTH_METER_SECONDS=${RAKKR_ALSA_PCH_HEALTH_METER_SECONDS:-3} RAKKR_ALSA_HEALTH_RUN_SECONDS=${RAKKR_ALSA_PCH_HEALTH_RUN_SECONDS:-8} RAKKR_ALSA_HEALTH_EXPECT_EVENT=agent.meter.flatline RAKKR_ALSA_HEALTH_EXPECT_SYNC=1 RAKKR_ALSA_HEALTH_WORK_DIR=${RAKKR_ALSA_PCH_HEALTH_SYNC_WORK_DIR:-/tmp/rakkr-alsa-pch-flatline-health-sync-test} RAKKR_ALSA_HEALTH_SMOKE_LABEL='ALSA PCH flatline health sync smoke' bash scripts/agent-alsa-health-smoke.sh"

[tasks."agent:alsa-pch-job-smoke"]
description = "Run a full recorder-agent job against the Debian rig HDA Intel PCH ALSA hardware device"
run = "env RAKKR_ALSA_JOB_EXPECT_CARD=PCH RAKKR_ALSA_JOB_DEVICE=hw:CARD=PCH,DEV=0 RAKKR_ALSA_JOB_FORMAT=S16_LE RAKKR_ALSA_JOB_CHANNELS=2 RAKKR_ALSA_JOB_SECONDS=${RAKKR_ALSA_PCH_JOB_SECONDS:-5} RAKKR_ALSA_JOB_WORK_DIR=${RAKKR_ALSA_PCH_JOB_WORK_DIR:-/tmp/rakkr-alsa-pch-job-test} RAKKR_ALSA_JOB_SMOKE_LABEL='ALSA PCH full-agent job smoke' bash scripts/agent-alsa-job-smoke.sh"

[tasks."ansible:runner-smoke"]
description = "Run the Dockerized Ansible lifecycle runner against the local compose SSH test rig"
run = "env RAKKR_ANSIBLE_SMOKE_SEQUENCE=update_binary,smoke_check node scripts/ansible-lifecycle-smoke.mjs"

[tasks."ansible:x32-smoke"]
description = "Run a safe Ansible smoke_check against the X32 test rig without deploying binaries"
run = "env RAKKR_ANSIBLE_SMOKE_HOST=${RAKKR_X32_ANSIBLE_HOST:-172.22.145.152} RAKKR_ANSIBLE_SMOKE_NODE_ID=node_x32_test node scripts/ansible-lifecycle-smoke.mjs"

[tasks."agent:fake-controller-smoke"]
depends = ["node:test", "rust:check", "rust:miri"]
description = "Run the recorder agent against a local fake controller and fake capture command"
run = "node scripts/agent-fake-controller-smoke.mjs"

[tasks."rust:build"]
description = "Build Rust crates"
run = "cargo build --workspace"

[tasks."rust:components"]
description = "Install Rust components required by local and CI checks"
run = "mise x rust@1.96.0 -- rustup component add clippy rustfmt && mise x rust@nightly-2026-06-25 -- rustup +nightly-2026-06-25 component add miri rust-src"

[tasks."rust:check"]
depends = ["rust:components"]
description = "Run cargo check"
run = "cargo check --workspace"

[tasks."rust:fmt"]
depends = ["rust:components"]
description = "Format Rust crates"
run = "cargo fmt --all"

[tasks."rust:fmt-check"]
depends = ["rust:components"]
description = "Check Rust formatting"
run = "cargo fmt --all --check"

[tasks."rust:clippy"]
depends = ["rust:components"]
description = "Run Clippy with warnings denied"
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks."rust:miri"]
depends = ["rust:components"]
description = "Run Miri tests with a mise-provided nightly Rust toolchain"
run = "mise x rust@nightly-2026-06-25 -- cargo miri test --workspace"

[tasks."docs:lint"]
description = "Lint the documentation site with ESLint and eslint-plugin-astro"
run = "pnpm --filter @rakkr/docs lint"

[tasks."docs:dev"]
description = "Run the Starlight documentation site"
run = "pnpm --filter @rakkr/docs dev"

[tasks."docs:build"]
description = "Build the Starlight documentation site"
run = "pnpm --filter @rakkr/docs build"

[tasks."docs:preview"]
description = "Preview the built Starlight documentation site"
run = "pnpm --filter @rakkr/docs preview"

[tasks."docs:cf-dev"]
depends = ["docs:build"]
description = "Serve the documentation site locally through the Cloudflare Worker (wrangler dev)"
run = "pnpm --filter @rakkr/docs cf-dev"

[tasks."docs:deploy"]
depends = ["docs:build"]
description = "Deploy the documentation site to Cloudflare Workers (wrangler deploy)"
run = "pnpm --filter @rakkr/docs deploy"
