[tools]
node = "24.15.0"
pnpm = "11.7.0"
rust = "1.95.0"

[env]
_.file = ".env"

[tasks.setup]
description = "Install toolchains and workspace dependencies"
run = "mise install && mise run install"

[tasks.install]
description = "Install workspace dependencies"
run = "pnpm install"

[tasks."services:up"]
description = "Start local development services"
run = "docker compose up -d postgres"

[tasks."services:down"]
description = "Stop local development services"
run = "docker compose down"

[tasks."install:ci"]
description = "Install workspace dependencies in CI with the locked dependency graph"
run = "pnpm install --frozen-lockfile"

[tasks.dev]
depends = ["node:build-libs"]
description = "Run the API and web UI"
run = "pnpm -r --parallel --filter @rakkr/api --filter @rakkr/web dev"

[tasks.check]
depends = [
  "auth:check-oidc",
  "check:loc",
  "db:verify",
  "ops:check-alerts",
  "ops:check-grafana",
  "ops:check-observability-docs",
  "ops:check-prometheus",
  "security:check-rbac",
  "security:check-transport",
  "scheduler:check",
  "recordings:check",
  "health:check-watchdog",
  "storage:check",
  "node:check",
  "node:test",
  "node:lint",
  "node:format-check",
  "agent:fake-controller-smoke",
  "rust:check",
  "rust:fmt-check",
  "rust:clippy",
  "rust:miri",
]
description = "Run all repository checks"

[tasks."auth:check-oidc"]
description = "Validate Azure AD OIDC baseline documentation"
run = "node scripts/verify-oidc-baseline.mjs"

[tasks.build]
depends = ["node:build", "rust:build"]
description = "Build the workspace"

[tasks."check:loc"]
description = "Enforce the 1000 LOC per file budget"
run = "node scripts/check-loc.mjs"

[tasks."ops:check-alerts"]
description = "Validate Prometheus alert rules"
run = "node scripts/verify-prometheus-alerts.mjs"

[tasks."ops:check-grafana"]
description = "Validate Grafana dashboard examples"
run = "node scripts/verify-grafana-dashboard.mjs"

[tasks."ops:check-observability-docs"]
description = "Validate observability runbook links"
run = "node scripts/verify-observability-docs.mjs"

[tasks."ops:check-prometheus"]
description = "Validate Prometheus scrape and Mimir remote write config"
run = "node scripts/verify-prometheus-config.mjs"

[tasks."security:check-rbac"]
description = "Validate RBAC and audit baseline documentation"
run = "node scripts/verify-rbac-audit-baseline.mjs"

[tasks."security:check-transport"]
description = "Validate transport security baseline documentation"
run = "node scripts/verify-transport-security-baseline.mjs"

[tasks."scheduler:check"]
description = "Validate scheduler baseline documentation"
run = "node scripts/verify-scheduler-baseline.mjs"

[tasks."recordings:check"]
description = "Validate recording library baseline documentation"
run = "node scripts/verify-recording-library-baseline.mjs"

[tasks."health:check-watchdog"]
description = "Validate health watchdog partial baseline documentation"
run = "node scripts/verify-health-watchdog-baseline.mjs"

[tasks."storage:check"]
description = "Validate storage upload baseline documentation"
run = "node scripts/verify-storage-upload-baseline.mjs"

[tasks."node:build-libs"]
description = "Build shared Node workspace libraries"
run = "pnpm --filter @rakkr/shared --filter @rakkr/db build"

[tasks."node:build"]
description = "Build Node workspace packages and apps"
run = "pnpm -r --if-present build"

[tasks."node:check"]
depends = ["node:build-libs"]
description = "Run TypeScript checks"
run = "pnpm -r --if-present check"

[tasks."node:test"]
depends = ["node:build-libs"]
description = "Run Node workspace tests"
run = "pnpm -r --if-present test"

[tasks."node:lint"]
description = "Run Oxlint with Tailwind CSS rules"
run = "pnpm exec oxlint . --react-plugin --jsx-a11y-plugin --import-plugin --deny-warnings"

[tasks."node:format"]
description = "Format Node/TypeScript files with Oxfmt"
run = "pnpm exec oxfmt --write apps packages \"!packages/db/drizzle/**\""

[tasks."node:format-check"]
description = "Check Node/TypeScript formatting with Oxfmt"
run = "pnpm exec oxfmt --check apps packages \"!packages/db/drizzle/**\""

[tasks."db:generate"]
description = "Generate Drizzle migrations"
run = "pnpm --filter @rakkr/db db:generate"

[tasks."db:migrate"]
description = "Apply Drizzle migrations to the configured Postgres database"
run = "pnpm --filter @rakkr/db db:migrate"

[tasks."db:verify"]
description = "Replay Drizzle migrations against a fresh throwaway Postgres database"
run = "pnpm --filter @rakkr/db db:verify"

[tasks."agent:loopback-smoke"]
description = "Exercise a Linux ALSA snd-aloop fake capture device"
run = "bash scripts/alsa-loopback-smoke.sh"

[tasks."agent:loopback-meter-smoke"]
description = "Sample Rakkr agent meters from a Linux ALSA snd-aloop fake capture device"
run = "bash scripts/agent-loopback-meter-smoke.sh"

[tasks."agent:loopback-render-smoke"]
description = "Capture and render mapped audio from a Linux ALSA snd-aloop fake device"
run = "bash scripts/alsa-loopback-render-smoke.sh"

[tasks."agent:fake-controller-smoke"]
depends = ["rust:check"]
description = "Run the recorder agent against a local fake controller and fake capture command"
run = "node scripts/agent-fake-controller-smoke.mjs"

[tasks."rust:build"]
description = "Build Rust crates"
run = "cargo build --workspace"

[tasks."rust:components"]
description = "Install Rust components required by local and CI checks"
run = "mise x rust@1.95.0 -- rustup component add clippy rustfmt && mise x rust@nightly-2026-06-17 -- rustup +nightly-2026-06-17 component add miri"

[tasks."rust:check"]
depends = ["rust:components"]
description = "Run cargo check"
run = "cargo check --workspace"

[tasks."rust:fmt"]
depends = ["rust:components"]
description = "Format Rust crates"
run = "cargo fmt --all"

[tasks."rust:fmt-check"]
depends = ["rust:components"]
description = "Check Rust formatting"
run = "cargo fmt --all --check"

[tasks."rust:clippy"]
depends = ["rust:components"]
description = "Run Clippy with warnings denied"
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks."rust:miri"]
depends = ["rust:components"]
description = "Run Miri tests with a mise-provided nightly Rust toolchain"
run = "mise x rust@nightly-2026-06-17 -- cargo miri test --workspace"
