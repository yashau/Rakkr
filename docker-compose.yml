services:
  postgres:
    image: postgres:17-alpine
    container_name: rakkr-postgres
    environment:
      POSTGRES_DB: rakkr
      POSTGRES_USER: rakkr
      POSTGRES_PASSWORD: rakkr
    ports:
      - "5432:5432"
    volumes:
      - rakkr-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rakkr -d rakkr"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  rakkr-postgres-data:
