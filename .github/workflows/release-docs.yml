name: Release docs

on:
  push:
    tags: ["docs-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (YYYY.MM.DD-N)"
        required: true

permissions:
  contents: read

concurrency:
  group: release-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 26.3.1

      - uses: jdx/mise-action@v4.2.0
        with:
          cache: true
          install: true

      - run: mise trust
      - run: mise run install:ci

      - name: Resolve docs version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#docs-v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build documentation site
        run: mise run docs:build

      - name: Deploy to Cloudflare Workers
        run: >-
          pnpm --filter @rakkr/docs exec wrangler deploy
          --var RAKKR_DOCS_VERSION:${{ steps.version.outputs.version }}
          --var RAKKR_DOCS_COMMIT:${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
