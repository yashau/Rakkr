name: CI

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: rakkr
          POSTGRES_PASSWORD: rakkr
          POSTGRES_USER: rakkr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rakkr -d rakkr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://rakkr:rakkr@127.0.0.1:5432/rakkr
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0

      - uses: jdx/mise-action@v4.1.0
        with:
          cache: true
          install: true

      - run: mise trust
      - run: mise run install:ci
      - run: mise run check
      - run: mise run build
