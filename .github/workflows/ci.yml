name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0

      - uses: jdx/mise-action@v4.1.0
        with:
          cache: true
          install: true

      - run: mise trust
      - run: pnpm install --frozen-lockfile
      - run: mise run check
      - run: mise run build
