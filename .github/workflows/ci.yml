name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          cache: true
          install: true

      - run: mise trust
      - run: pnpm install --frozen-lockfile
      - run: mise run check
      - run: mise run build
