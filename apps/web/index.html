<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rakkr</title>
    <script>
      // Apply the persisted/system theme before first paint to avoid a flash of
      // the wrong theme. Must mirror next-themes defaults (storageKey "theme",
      // attribute "class"); the ThemeProvider takes over after hydration.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = stored === "dark" || ((!stored || stored === "system") && systemDark);
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {
          /* localStorage/matchMedia unavailable — fall back to light theme. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
