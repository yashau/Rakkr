---
# Binary source: "release" pulls a published GitHub release (default); "local"
# copies an already-staged artifact from rakkr_agent_binary_src (offline/smoke).
rakkr_agent_source: release
rakkr_agent_repo: yashau/Rakkr
# "latest" resolves the newest GitHub release; otherwise pin a full release tag
# such as agent-v2026.06.28-1.
rakkr_agent_version: latest
rakkr_github_api_url: https://api.github.com
rakkr_github_token: ""
rakkr_github_headers: "{{ {'Authorization': 'Bearer ' + rakkr_github_token} if (rakkr_github_token | length > 0) else {} }}"
rakkr_agent_download_dir: /var/lib/rakkr/agent/artifacts
rakkr_agent_target_map:
  aarch64: aarch64-unknown-linux-musl
  x86_64: x86_64-unknown-linux-musl
# Release tags are component-prefixed (agent-v<YYYY.MM.DD-N>) but the published
# asset filenames use the bare calendar version, so strip the prefix for them.
rakkr_agent_clean_version: "{{ rakkr_agent_resolved_version | regex_replace('^agent-v', '') }}"
rakkr_agent_archive_name: "rakkr-recorder-agent-{{ rakkr_agent_clean_version }}-{{ rakkr_agent_target }}.tar.gz"
rakkr_agent_release_asset_base: "https://github.com/{{ rakkr_agent_repo }}/releases/download/{{ rakkr_agent_resolved_version }}"
rakkr_agent_binary_src: /opt/rakkr-artifacts/rakkr-recorder-agent
# Agent runtime configuration threaded from the controller/runner (kept out of
# node metadata). Empty by default; the runner forwards per-node values that the
# env template renders only when present.
rakkr_controller_url: https://rakkr-controller.local
rakkr_controller_token: ""
rakkr_allow_insecure_controller: ""
rakkr_node_alias: ""
rakkr_node_site: ""
rakkr_node_room: ""
rakkr_capture_backend: ""
rakkr_capture_device: ""
rakkr_capture_channels: ""
rakkr_capture_format: ""
rakkr_capture_sample_rate: ""
rakkr_meter_backend: ""
# The agent must read the audio device; grant the service user audio access.
rakkr_agent_supplementary_groups: audio
rakkr_agent_env_file: /etc/rakkr/recorder-agent.env
rakkr_agent_service_enabled: true
rakkr_agent_service_state: started
rakkr_controller_ca_dest: /usr/local/share/ca-certificates/rakkr-controller-ca.crt
rakkr_controller_ca_src: ""
rakkr_node_smoke_command: /opt/rakkr/bin/rakkr-recorder-agent --print-inventory
rakkr_recorder_packages_common:
  - alsa-utils
  - ca-certificates
  - curl
  - ffmpeg
  - jq
  - python3
  - sudo
