apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rakkr-controller.fullname" . }}-web
  labels:
    {{- include "rakkr-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "rakkr-controller.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "rakkr-controller.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
      {{- with .Values.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "rakkr-controller.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: RAKKR_API_UPSTREAM
              value: "http://{{ include "rakkr-controller.fullname" . }}-api:{{ .Values.api.service.port }}"
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Probe nginx's own local health endpoint, NOT the API-proxied /healthz:
          # the web tier must stay live/ready whenever nginx can serve, so an API
          # outage or a slow first-install migration cannot crash-loop it or pull
          # it (and thus /api, which the ingress routes only here) out of service.
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
