apiVersion: v1
kind: Service
metadata:
  name: {{ include "rakkr-controller.fullname" . }}-api
  labels:
    {{- include "rakkr-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    {{- include "rakkr-controller.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
