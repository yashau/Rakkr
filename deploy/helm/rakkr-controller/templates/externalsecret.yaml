{{- if and (eq .Values.secrets.backend "externalSecrets") (not .Values.appSecret.existingSecret) -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "rakkr-controller.appSecretName" . }}
  labels:
    {{- include "rakkr-controller.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ required "secrets.externalSecrets.secretStoreRef.name is required for the externalSecrets backend" .Values.secrets.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.secrets.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "rakkr-controller.appSecretName" . }}
    creationPolicy: Owner
  {{- with .Values.secrets.externalSecrets.data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.secrets.externalSecrets.dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
