apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rakkr-controller.fullname" . }}-api
  labels:
    {{- include "rakkr-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  # The API mounts a single ReadWriteOnce PVC (api-pvc.yaml) for its JSON stores +
  # recording cache. RollingUpdate would start the new pod before terminating the
  # old one on an image-tag upgrade; both would mount the same RWO volume, so the
  # new pod is stuck Multi-Attach and the rollout deadlocks. Recreate tears the old
  # pod down first — the correct single-writer posture (brief cutover, never
  # double-mounts). Raising api.replicaCount would also multi-write the JSON stores;
  # HA requires moving those to Postgres or an RWX volume first.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "rakkr-controller.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "rakkr-controller.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "rakkr-controller.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-database
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - node
            - -e
            - |
              const net = require("node:net");
              const url = new URL(process.env.DATABASE_URL);
              let remaining = 60;
              const port = Number(url.port || 5432);
              function probe() {
                const socket = net.connect(port, url.hostname);
                socket.setTimeout(2000);
                socket.once("connect", () => process.exit(0));
                socket.once("timeout", () => socket.destroy());
                socket.once("error", retry);
                socket.once("close", retry);
              }
              function retry() {
                if (remaining-- <= 0) process.exit(1);
                setTimeout(probe, 2000);
              }
              probe();
          env:
            {{- include "rakkr-controller.databaseEnv" . | nindent 12 }}
        {{- if .Values.api.migrateOnStartup }}
        - name: migrate
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - sh
            - -lc
            - cd packages/db && ./node_modules/.bin/drizzle-kit migrate
          {{- include "rakkr-controller.apiEnvFrom" . | nindent 10 }}
          env:
            {{- include "rakkr-controller.databaseEnv" . | nindent 12 }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
          {{- include "rakkr-controller.apiEnvFrom" . | nindent 10 }}
          env:
            {{- include "rakkr-controller.databaseEnv" . | nindent 12 }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: api-data
              mountPath: /var/lib/rakkr
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: api-data
          {{- if .Values.api.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "rakkr-controller.fullname" . }}-api-data
          {{- else }}
          emptyDir: {}
          {{- end }}
