{{- if .Values.migrations.job.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rakkr-controller.fullname" . }}-migrate
  labels:
    {{- include "rakkr-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  # Sequence the migration ahead of the API rollout: as a pre-install/pre-upgrade
  # hook (weight -5, so it runs before any other hook) the Job runs and completes
  # before the API Deployment is applied, so the API never starts against an
  # un-migrated schema. before-hook-creation deletes the prior hook Job so a
  # re-run isn't blocked by an immutable completed Job. Hooks are NOT applied for
  # bundled Postgres (the StatefulSet isn't up during pre-install) — the
  # validate.yaml guard forces postgres.enabled=false whenever this Job is on.
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migrations.job.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "rakkr-controller.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "rakkr-controller.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-database
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - node
            - -e
            - |
              const net = require("node:net");
              const url = new URL(process.env.DATABASE_URL);
              let remaining = 60;
              const port = Number(url.port || 5432);
              function probe() {
                const socket = net.connect(port, url.hostname);
                socket.setTimeout(2000);
                socket.once("connect", () => process.exit(0));
                socket.once("timeout", () => socket.destroy());
                socket.once("error", retry);
                socket.once("close", retry);
              }
              function retry() {
                if (remaining-- <= 0) process.exit(1);
                setTimeout(probe, 2000);
              }
              probe();
          env:
            {{- include "rakkr-controller.databaseEnv" . | nindent 12 }}
      containers:
        - name: migrate
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - sh
            - -lc
            - cd packages/db && ./node_modules/.bin/drizzle-kit migrate
          {{- include "rakkr-controller.apiEnvFrom" . | nindent 10 }}
          env:
            {{- include "rakkr-controller.databaseEnv" . | nindent 12 }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
{{- end }}
