nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

appSecret:
  create: true
  name: ""
  # Name of a pre-provisioned Secret to use instead of one the chart manages.
  # Honored regardless of secrets.backend; when set, the chart renders no
  # Secret / ExternalSecret / SealedSecret for the app.
  existingSecret: ""

# Where the controller's sensitive env comes from. Every secret is sourced from
# a Kubernetes Secret named after appSecret; only how that Secret is populated
# changes:
#   native          - the chart renders an Opaque Secret from api.secretEnv
#                     (dev/simple installs; provide real values, e.g. via
#                     values-dev.yaml or --set).
#   externalSecrets - an ExternalSecret (External Secrets Operator) materializes
#                     the Secret from a configured store (Vault/AWS SM/GCP SM/...).
#   sealed          - a committed SealedSecret (Sealed Secrets controller)
#                     materializes the Secret.
secrets:
  backend: native
  externalSecrets:
    refreshInterval: 1h
    secretStoreRef:
      name: ""
      kind: ClusterSecretStore
    # `data`/`dataFrom` are passed through to the ExternalSecret spec verbatim.
    data: []
    dataFrom: []
  sealed:
    # `kubeseal`-encrypted values, key -> ciphertext.
    encryptedData: {}

api:
  replicaCount: 1
  image:
    repository: rakkr/controller-api
    tag: local
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8787
  podAnnotations: {}
  resources: {}
  migrateOnStartup: true
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClassName: ""
  env:
    NODE_ENV: production
    PORT: "8787"
    RAKKR_WEB_ORIGIN: http://localhost
    RAKKR_ALLOW_INSECURE_CONTROLLER: "0"
    RAKKR_LOCAL_ADMIN_EMAIL: admin@rakkr.local
    RAKKR_LOCAL_ADMIN_ID: 00000000-0000-4000-8000-000000000001
    RAKKR_LOCAL_ADMIN_NAME: Local Admin
    RAKKR_LOCAL_ADMIN_GROUPS: ""
    RAKKR_LOCAL_RESOURCE_GRANTS: '{"node":["node_x32_test"],"recording":["rec_demo_001"]}'
    RAKKR_LOCAL_ACCESS_POLICIES: "[]"
    RAKKR_OIDC_ENABLED: "0"
    RAKKR_OIDC_AZURE_TENANT_ID: ""
    RAKKR_OIDC_CLIENT_ID: ""
    RAKKR_OIDC_REDIRECT_URI: http://localhost/api/v1/auth/oidc/callback
    RAKKR_OIDC_SCOPES: openid profile email
    RAKKR_RECORDING_CACHE_DIR: /var/lib/rakkr/recordings
    RAKKR_RECORDING_JOB_STORE_PATH: /var/lib/rakkr/controller/recording-jobs.json
    RAKKR_RECORDING_METADATA_STORE_PATH: /var/lib/rakkr/controller/recordings-metadata.json
    RAKKR_SCHEDULE_STORE_PATH: /var/lib/rakkr/controller/schedules.json
    RAKKR_UPLOAD_POLICY_STORE_PATH: /var/lib/rakkr/controller/upload-policies.json
    RAKKR_UPLOAD_PROVIDER_STORE_PATH: /var/lib/rakkr/controller/upload-providers.json
    RAKKR_UPLOAD_QUEUE_STORE_PATH: /var/lib/rakkr/controller/upload-queue.json
    RAKKR_RETENTION_POLICY_STORE_PATH: /var/lib/rakkr/controller/retention-policies.json
    RAKKR_RECORDING_PROFILE_STORE_PATH: /var/lib/rakkr/controller/recording-profiles.json
    RAKKR_WATCHDOG_POLICY_STORE_PATH: /var/lib/rakkr/controller/watchdog-policies.json
    RAKKR_CHANNEL_MAP_TEMPLATE_STORE_PATH: /var/lib/rakkr/controller/channel-map-templates.json
    RAKKR_CHANNEL_MAP_ASSIGNMENT_STORE_PATH: /var/lib/rakkr/controller/channel-map-assignments.json
    RAKKR_CHANNEL_MAP_ASSIGNMENT_PLAN_STORE_PATH: /var/lib/rakkr/controller/channel-map-assignment-plans.json
  # Sensitive env, sourced from the app Secret (see `secrets` above). No real
  # values are committed here — production must supply them via the chosen
  # secrets backend; dev defaults live in values-dev.yaml.
  secretEnv:
    RAKKR_LOCAL_ADMIN_PASSWORD: ""
    RAKKR_OIDC_CLIENT_SECRET: ""
    # Master key for encrypting upload-provider secrets at rest.
    RAKKR_SECRET_KEY: ""
    # Master key for encrypting node SSH private keys at rest (falls back to
    # RAKKR_SECRET_KEY if empty).
    RAKKR_NODE_SSH_MASTER_KEY: ""
    # Shared token the Ansible runner presents to fetch per-node SSH keys/tokens.
    RAKKR_RUNNER_TOKEN: ""
  extraEnv: []
  extraEnvFrom: []

web:
  replicaCount: 1
  image:
    repository: rakkr/controller-web
    tag: local
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  podAnnotations: {}
  resources: {}
  extraEnv: []

database:
  externalUrl: ""
  existingSecret:
    name: ""
    key: DATABASE_URL

postgres:
  enabled: true
  image:
    repository: postgres
    tag: 17-alpine
    pullPolicy: IfNotPresent
  auth:
    database: rakkr
    username: rakkr
    # No committed default; provide via existingSecret, --set, or values-dev.yaml.
    # This password is independent of the DATABASE_URL the app secret carries: if
    # you supply DATABASE_URL via an external/ESO/sealed app secret while keeping
    # this bundled Postgres, set `existingSecret` (or a matching `password`) so the
    # two agree — otherwise Postgres boots with an empty password the API can't use.
    # When you bring your own database, prefer `postgres.enabled: false`.
    password: ""
    existingSecret: ""
    passwordKey: POSTGRES_PASSWORD
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClassName: ""
  resources: {}

migrations:
  job:
    enabled: false
    backoffLimit: 3

ingress:
  enabled: false
  className: ""
  # Recorder-agent cache-file uploads (up to RAKKR_RECORDING_CACHE_MAX_BYTES,
  # 4 GiB default) reach the API through this ingress -> web (nginx) path, so the
  # ingress-nginx 1 MB default body cap must be lifted or every upload 413s. "0"
  # defers to the controller's own bounded cap (agent-cache-upload-body.ts).
  # Override the key if you run a non-nginx ingress controller.
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  hosts:
    - host: rakkr.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
