<svg width="760" height="280" viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg">
  <!-- ==== Rakkr logo lockup (navy, transparent background) ====
       Edit these colors to retheme:
       tile     = #0d2b4e  (background square)
       letter   = #ffffff  (the r in the tile)
       dot      = #e5484d  (recording dot)
       wordmark = #0d2b4e  (the "Rakkr" text)
  -->
  <rect x="20" y="20" width="240" height="240" rx="56" fill="#0d2b4e"/>
  <text x="84" y="208" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="206" fill="#ffffff">r</text>
  <circle cx="200" cy="80" r="26" fill="#e5484d"/>
  <text x="300" y="190" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="150" letter-spacing="-3" fill="#0d2b4e">Rakkr</text>
</svg>
